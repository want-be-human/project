# Alembic configuration file for NetTwin-SOC

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# sys.path prepend
prepend_sys_path = .

# timezone for file_template date
# timezone = UTC

# max length for version name
# truncate_slug_length = 40

# revision naming convention
# revision_environment = false

# sourceless mode
# sourceless = false

# version path separator
# version_path_separator = os

# version_locations defines additional directories to search for migrations
# version_locations = %(here)s/bar:%(here)s/bat:alembic/versions

# output encoding
# output_encoding = utf-8

sqlalchemy.url = sqlite:///./data/nettwin.db


[post_write_hooks]
# post_write_hooks defines scripts or Python functions run after new
# revision scripts are written

# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -q


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
