services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app
    ports:
      - "8000:8000"
    volumes:
      - ../backend/app:/app/app
      - ../backend/models:/app/models
      - ../backend/alembic:/app/alembic
      - ../backend/alembic.ini:/app/alembic.ini:ro
      - ../backend/data:/app/data
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./data/nettwin.db}
      - DATA_DIR=/app/data
      - DEBUG=true
      - WATCHFILES_FORCE_POLLING=true
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
      target: dev
    working_dir: /app
    command: npm run dev -- --hostname 0.0.0.0 --port 3000 --webpack
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
      - API_BASE_URL_INTERNAL=http://backend:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
      - CHOKIDAR_USEPOLLING=1
      - WATCHPACK_POLLING=true
      - NEXT_TELEMETRY_DISABLED=1
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ../frontend:/app
      - ../contract:/contract:ro
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    restart: unless-stopped

  # Optional PostgreSQL database - uncomment for production
  # db:
  #   image: postgres:15-alpine
