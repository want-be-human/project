services:
  backend:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app
    environment:
      - DEBUG=true
      - WATCHFILES_FORCE_POLLING=true
    volumes:
      - ../backend/app:/app/app
      - ../backend/alembic:/app/alembic
      - ../backend/alembic.ini:/app/alembic.ini:ro
      - backend_data:/app/data

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
      target: deps
    working_dir: /app
    command: sh -c "npm install; npm run dev -- --hostname 0.0.0.0 --port 3000"
    environment:
      - NEXT_PUBLIC_API_MODE=${NEXT_PUBLIC_API_MODE:-real}
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
      - CHOKIDAR_USEPOLLING=1
      - WATCHPACK_POLLING=true
    volumes:
      - ../frontend:/app
      - ../contract:/contract:ro
      - frontend_node_modules:/app/node_modules

volumes:
  frontend_node_modules:
